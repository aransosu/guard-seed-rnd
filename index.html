<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Seed 02-C — 3전장 / 전면 방패 액션</title>
<style>
  :root{
    --bg:#0e1017; --bg2:#151823; --line:#2a2f3d;
    --lane:#171b27; --lane-edge:#272d3c; --lane-here:#22304e;
    --ink:#e9edf6; --ink-dim:#9aa3b6; --ink-faint:#5d6678;

    --hero:#7fc8ff; --hero2:#4f6da0;
    --warrior:#d8a657; --archer:#86c97f; --priest:#76e0c2;
    --guardian:#7fb0e0; --mage:#b48cff; --rogue:#c98fb0; --monk:#e0c876;
    --foe1:#a06a52; --foe2:#8a6a9a; --foe3:#9aa05a;

    --miss:#ff5a6a; --guard:#ffb454; --parry:#5fa8ff; --perfect:#ffd96a;
    --good:#76e0c2; --danger:#ff5a6a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; background:#05060a; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
    overscroll-behavior:none; user-select:none; -webkit-user-select:none;}
  #app{position:relative; width:100%; max-width:430px; height:100%; margin:0 auto; overflow:hidden;
    background:radial-gradient(130% 90% at 50% -10%, #181d2b 0%, var(--bg) 55%, #090b11 100%);
    display:flex; flex-direction:column;}

  /* ===== HUD ===== */
  #hud{flex:0 0 auto; padding:8px 13px 5px; display:flex; flex-direction:column; gap:4px; z-index:6;}
  .hud-row{display:flex; align-items:baseline; justify-content:space-between;}
  .title{font-size:12px; font-weight:700; letter-spacing:.4px;}
  .title b{color:var(--hero);}
  .surv{font-variant-numeric:tabular-nums; font-size:11px; color:var(--ink-dim);}
  .surv b{color:var(--ink); font-size:14px;}
  .tally{display:flex; gap:8px; font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink-faint);}
  .tally span{display:inline-flex; gap:3px; align-items:center;}
  .tally i{width:6px; height:6px; border-radius:2px; display:inline-block;}
  .t-perfect i{background:var(--perfect);} .t-parry i{background:var(--parry);}
  .t-guard i{background:var(--guard);} .t-miss i{background:var(--miss);}
  .tally em{font-style:normal; color:var(--ink-dim);}
  .supinfo{font-size:11px; color:var(--ink-dim);} .supinfo b{color:var(--hero);}

  /* ===== 배경 3전장 ===== */
  #lanes{flex:1 1 auto; display:flex; flex-direction:column; gap:7px; padding:2px 9px 4px; min-height:0;
    transition:filter .28s ease, transform .28s ease, opacity .28s ease;}
  #lanes.dimmed{filter:blur(2.5px) brightness(.42) saturate(.7); transform:scale(.975);}
  .lane{position:relative; flex:1 1 0; border-radius:13px; overflow:hidden;
    background:linear-gradient(180deg, var(--lane) 0%, #12151f 100%);
    border:1px solid var(--lane-edge);
    display:flex; flex-direction:column;
    transition:border-color .18s, box-shadow .18s, background .18s;}
  .lane.here{border-color:var(--hero); background:linear-gradient(180deg, var(--lane-here) 0%, #141a28 100%);
    box-shadow:inset 0 0 0 1px rgba(127,200,255,.22), 0 0 18px rgba(127,200,255,.09);}
  .lane.warning{border-color:var(--danger); animation:lanePulse 1s ease-in-out infinite;}
  @keyframes lanePulse{0%,100%{box-shadow:inset 0 0 0 1px rgba(255,90,106,.45), 0 0 16px rgba(255,90,106,.18);}50%{box-shadow:inset 0 0 0 2px rgba(255,90,106,.85), 0 0 28px rgba(255,90,106,.4);}}
  .lane.broken{filter:grayscale(.5) brightness(.72);}
  .lane.saved-flash{animation:savedF .5s ease-out;}
  .lane.hit-flash{animation:hitF .42s ease-out;}
  @keyframes savedF{0%{box-shadow:inset 0 0 0 2px var(--good), 0 0 26px rgba(118,224,194,.5);}100%{box-shadow:none;}}
  @keyframes hitF{0%{box-shadow:inset 0 0 0 2px var(--danger), 0 0 26px rgba(255,90,106,.55);}20%{transform:translateX(-3px);}60%{transform:translateX(3px);}100%{box-shadow:none; transform:none;}}

  .lane-head{display:flex; justify-content:space-between; align-items:center; padding:3px 9px 0; z-index:3;}
  .lane-name{font-size:10.5px; font-weight:700; color:var(--ink-dim); letter-spacing:.5px;}
  .lane-name .sup{color:var(--hero); font-size:9.5px; margin-left:5px;}
  .lane-state{font-size:9.5px; color:var(--ink-faint);}
  .lane-state.warn{color:var(--danger); font-weight:700;}

  .stage{position:relative; flex:1 1 auto; margin:1px 8px;}
  .ally-line{position:absolute; left:20%; top:8%; bottom:8%; width:2px; border-radius:2px;
    background:linear-gradient(180deg,transparent,rgba(127,200,255,.45),transparent);}
  .allies{position:absolute; left:0; top:0; bottom:0; width:20%;
    display:flex; flex-direction:column; justify-content:center; align-items:center; gap:3px; z-index:2;}
  .u{border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.5); position:relative;}
  .u.ally{width:15px; height:15px; background:linear-gradient(150deg,#fff3,transparent), var(--c);}
  .u.ally.atk{animation:allyAtk .26s ease-out;}
  @keyframes allyAtk{0%{transform:translateX(0)}40%{transform:translateX(4px)}100%{transform:translateX(0)}}
  .battlefield{position:absolute; left:20%; right:0; top:0; bottom:0; z-index:1;}
  .foe{position:absolute; width:13px; height:13px; border-radius:5px 5px 7px 7px; top:50%;
    transform:translate(50%,-50%); background:linear-gradient(150deg,#0005,transparent), var(--c);
    box-shadow:0 1px 3px rgba(0,0,0,.5); transition:opacity .15s;}
  .foe.big{width:21px; height:21px;}
  .foe.dying{opacity:0; transform:translate(50%,-50%) scale(.3);}
  .shot{position:absolute; width:5px; height:2px; border-radius:2px; background:#cfe9ff; top:50%;
    transform:translateY(-50%); box-shadow:0 0 4px #aef; z-index:2;}

  .integrity{position:absolute; left:9px; right:9px; bottom:3px; height:3px; border-radius:2px;
    background:#0007; overflow:hidden; z-index:3;}
  .integrity i{display:block; height:100%; width:100%; border-radius:2px;
    background:linear-gradient(90deg, var(--good), #9fe0c8); transition:width .25s, background .25s;}
  .integrity.low i{background:linear-gradient(90deg, var(--guard), #ffd07a);}
  .integrity.crit i{background:linear-gradient(90deg, var(--danger), #ff8a8a);}

  .support-badge{position:absolute; right:8px; top:50%; transform:translateY(-50%);
    font-size:15px; opacity:0; transition:opacity .2s; z-index:4; filter:drop-shadow(0 0 6px rgba(127,200,255,.7));}
  .lane.here .support-badge{opacity:1;}

  /* ===== 컨트롤 ===== */
  #hint{position:absolute; left:0; right:0; bottom:58px; text-align:center; font-size:11px;
    color:var(--ink-faint); pointer-events:none; transition:opacity .4s; z-index:6;}
  #hint b{color:var(--ink-dim);}
  #controls{flex:0 0 auto; display:flex; gap:8px; padding:7px 13px 13px; z-index:6;}
  .btn{flex:1; padding:11px 0; border-radius:11px; border:1px solid var(--lane-edge);
    background:#1a1f2d; color:var(--ink-dim); font-size:13px; font-weight:600;}
  .btn:active{transform:translateY(1px);}
  .btn.go{background:linear-gradient(180deg,#27406a,#1d3052); color:#dfeeff; border-color:#3a5a90;}

  /* ===== 전면 방패 액션 ===== */
  #front{position:absolute; inset:0; z-index:15; display:flex; flex-direction:column;
    opacity:0; pointer-events:none; transition:opacity .2s;
    background:radial-gradient(120% 80% at 50% 18%, rgba(40,30,60,.30), rgba(6,7,12,.74) 70%);}
  #front.on{opacity:1; pointer-events:auto;}
  .fa-top{flex:0 0 auto; text-align:center; padding:54px 16px 0;}
  .fa-lane{font-size:20px; font-weight:800; letter-spacing:.5px; color:#fff;
    text-shadow:0 2px 14px rgba(0,0,0,.6);}
  .fa-pat{margin-top:4px; font-size:12px; color:var(--danger); font-weight:700; letter-spacing:1px;}
  .fa-stage{flex:1 1 auto; position:relative; margin:8px 0;}
  .fa-incoming{position:absolute; inset:0; z-index:3; pointer-events:none;}
  /* 중앙 방어 접점 — 공격이 여기로 수렴, 겹치는 순간 탭 */
  .fa-target{position:absolute; left:50%; top:42%; transform:translate(-50%,-50%); z-index:4;
    width:80px; height:80px; border-radius:50%; border:2.5px solid rgba(127,200,255,.6);
    box-shadow:0 0 20px rgba(127,200,255,.28), inset 0 0 16px rgba(127,200,255,.2);}
  .fa-target .tcore{position:absolute; inset:32%; border-radius:50%;
    background:radial-gradient(circle,rgba(127,200,255,.4),rgba(127,200,255,.12));}
  .fa-target .tpulse{position:absolute; inset:-2px; border-radius:50%; border:2px solid rgba(127,200,255,.35);
    animation:tPulse 1.6s ease-in-out infinite;}
  @keyframes tPulse{0%,100%{transform:scale(1); opacity:.5;}50%{transform:scale(1.12); opacity:.15;}}
  /* 수렴 공격 링 — 바깥에서 접점으로 조여듦 */
  .incoming{position:absolute; left:50%; top:42%; transform:translate(-50%,-50%); border-radius:50%;
    border:3px solid; will-change:width,height,opacity;}
  .incoming::after{content:""; position:absolute; inset:5px; border-radius:50%; border:1.5px solid #ffffff55;}
  .fa-shield{position:absolute; left:50%; bottom:3%; transform:translateX(-50%); z-index:5;
    width:300px; height:360px; max-height:48vh; display:flex; align-items:flex-end; justify-content:center;
    filter:drop-shadow(0 10px 22px rgba(0,0,0,.55));}
  #faHeroImg{width:100%; height:100%; object-fit:contain; object-position:bottom center; pointer-events:none;}
  .fa-shield.guard{animation:shGuard .24s ease-out;}
  .fa-shield.perfect{animation:shPerfect .44s ease-out;}
  .fa-shield.broken{animation:shBroken .42s ease-out;}
  @keyframes shGuard{0%{transform:translateX(-50%) scale(1)}40%{transform:translateX(-50%) scale(1.05)}100%{transform:translateX(-50%) scale(1)}}
  @keyframes shPerfect{0%{transform:translateX(-50%) scale(1); filter:drop-shadow(0 10px 22px rgba(0,0,0,.55))}28%{transform:translateX(-50%) scale(1.09); filter:drop-shadow(0 0 32px var(--perfect)) brightness(1.25)}100%{transform:translateX(-50%) scale(1); filter:drop-shadow(0 10px 22px rgba(0,0,0,.55))}}
  @keyframes shBroken{0%,100%{transform:translateX(-50%)}20%{transform:translateX(-54%) rotate(-2deg)}60%{transform:translateX(-46%) rotate(2deg)}}
  .fa-tip{flex:0 0 auto; text-align:center; font-size:12px; color:var(--ink-dim); padding-bottom:8px;}
  .fa-judge{position:absolute; left:0; right:0; top:46%; text-align:center; font-size:30px; font-weight:900;
    letter-spacing:1px; pointer-events:none; opacity:0; z-index:8;}

  /* ===== Lab 패널 ===== */
  #scrim{position:absolute; inset:0; background:#000a; opacity:0; pointer-events:none; transition:opacity .2s; z-index:20;}
  #scrim.open{opacity:1; pointer-events:auto;}
  #panel{position:absolute; left:0; right:0; bottom:0; z-index:21; transform:translateY(102%);
    transition:transform .26s cubic-bezier(.2,.8,.2,1);
    background:#141823; border-top:1px solid #2c3242; border-radius:18px 18px 0 0;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));}
  #panel.open{transform:translateY(0);}
  .p-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .p-head h2{margin:0; font-size:14px;} .p-head .x{font-size:13px; color:var(--ink-dim); background:none; border:none;}
  .ctrl{margin:8px 0;}
  .crow{display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;}
  .cname{color:var(--ink-dim);} .cval{color:var(--hero); font-variant-numeric:tabular-nums;}
  input[type=range]{width:100%; accent-color:var(--hero); height:20px;}
  .p-foot{display:flex; gap:8px; margin-top:10px;}
  .ptip{font-size:11px; color:var(--ink-faint); line-height:1.5; margin-top:2px;}
  .hidden{display:none;}
</style>
</head>
<body>
<div id="app">

  <div id="hud">
    <div class="hud-row">
      <div class="title">Seed 02-C2 · <b>전선 선택 / 접점 방어</b></div>
      <div class="surv"><b id="survT">0.0</b>s</div>
    </div>
    <div class="hud-row">
      <div class="tally">
        <span class="t-perfect"><i></i><em>P</em> <b id="cP">0</b></span>
        <span class="t-parry"><i></i><em>Pa</em> <b id="cPa">0</b></span>
        <span class="t-guard"><i></i><em>G</em> <b id="cG">0</b></span>
        <span class="t-miss"><i></i><em>놓침</em> <b id="cM">0</b></span>
      </div>
      <div class="supinfo">지원 <b id="supName">중단</b></div>
    </div>
  </div>

  <div id="lanes"></div>

  <div id="hint"><b>위험한 전선</b>을 탭해 막으러 간다 · 중앙 접점에서 <b>팜팜팜</b></div>

  <div id="controls">
    <button class="btn" id="resetBtn">↺ 리셋</button>
    <button class="btn go" id="labBtn">⚙ Lab</button>
  </div>

  <!-- 전면 방패 액션 레이어 -->
  <div id="front">
    <div class="fa-top">
      <div class="fa-lane" id="faLane">중단 전선</div>
      <div class="fa-pat" id="faPat">돌파 공격</div>
    </div>
    <div class="fa-stage">
      <div class="fa-incoming" id="faIncoming"></div>
      <div class="fa-target" id="faTarget"><div class="tcore"></div><div class="tpulse"></div></div>
      <div class="fa-shield" id="faShield"><img id="faHeroImg" alt="방패 용사"></div>
      <div class="fa-judge" id="faJudge"></div>
    </div>
    <div class="fa-tip">화면을 탭해서 막아라</div>
  </div>

  <div id="scrim"></div>
  <div id="panel">
    <div class="p-head"><h2>Lab · 튜닝</h2><button class="x" id="closeX">닫기 ✕</button></div>
    <div class="ctrl"><div class="crow"><span class="cname">예고 속도(작을수록 빠름)</span><span class="cval" id="vTele"></span></div>
      <input type="range" id="sTele" min="0.6" max="1.6" step="0.05"></div>
    <div class="ctrl"><div class="crow"><span class="cname">돌파 빈도(작을수록 자주)</span><span class="cval" id="vGap"></span></div>
      <input type="range" id="sGap" min="1800" max="6000" step="100"></div>
    <div class="ctrl"><div class="crow"><span class="cname">동시 돌파 최대</span><span class="cval" id="vMax"></span></div>
      <input type="range" id="sMax" min="1" max="2" step="1"></div>
    <div class="ctrl"><div class="crow"><span class="cname">PERFECT 윈도우(±ms)</span><span class="cval" id="vPf"></span></div>
      <input type="range" id="sPf" min="30" max="100" step="5"></div>
    <div class="ptip">패널을 열면 일시정지. 재개하면 멈춘 지점부터 점프 없이 이어져.</div>
    <div class="p-foot">
      <button class="btn" id="defBtn">기본값</button>
      <button class="btn go" id="closeBtn">▶ 재개</button>
    </div>
  </div>

</div>

<script>
"use strict";
(function(){
  // ===== 단일 시계 (pause 동결) — v06 계승 =====
  let pausedAccum=0, pauseStart=0, paused=false;
  const perf=()=>performance.now();
  const gameNow=()=>perf()-pausedAccum;
  const $=id=>document.getElementById(id);
  const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
  const lerp=(a,b,t)=>a+(b-a)*t;

  // ===== 판정 — v06 계승 =====
  function judge(ae){ return ae<=T.perfect?"PERFECT":ae<=T.parry?"PARRY":ae<=T.guard?"GUARD":"MISS"; }

  // ===== 튜닝 =====
  const DEFAULTS={ teleScale:1.0, threatGap:3600, maxConcurrent:2, perfect:60, parry:130, guard:240,
                   integrityMax:100, leakSupported:0.35, leakOpen:0.85, regen:0.45 };
  const T=Object.assign({},DEFAULTS);

  // ===== 위협 패턴 (전면 액션 노트) =====
  // 노트 hit: {impact, spawnAt, big, resolved, judgment, el}
  const PATTERNS={
    single:{ key:"single", name:"단타 — 빠른 일격",   dmg:16,
      notes(now,ts){ const lead=950*ts; return [N(now, now+lead, false)]; } },
    triple:{ key:"triple", name:"3연타 — 연속 돌격",  dmg:9,
      notes(now,ts){ const lead=620*ts, step=300*ts, i0=now+760*ts;
        return [N(i0-lead,i0,false), N(i0+step-lead,i0+step,false), N(i0+step*2-lead,i0+step*2,false)]; } },
    heavy:{ key:"heavy", name:"강타 — 군단 돌파",     dmg:34,
      notes(now,ts){ const lead=1550*ts; return [N(now, now+lead, true)]; } },
  };
  function N(spawnAt, impact, big){ return {spawnAt, impact, big:!!big, resolved:false, judgment:null, el:null}; }
  const PATTERN_KEYS=["single","triple","heavy"];
  const LANE_POOL={ top:["single","triple","single"], mid:["heavy","single","triple"], bot:["triple","single","heavy"] };

  // ===== 전장 정의 =====
  const LANE_DEFS=[
    { id:"top", name:"상단 전선", allies:["--warrior","--archer","--priest"], foe:"--foe1" },
    { id:"mid", name:"중단 전선", allies:["--guardian","--mage","--priest"], foe:"--foe2" },
    { id:"bot", name:"하단 전선", allies:["--rogue","--mage","--monk"],     foe:"--foe3" },
  ];
  const SHORT={top:"상단", mid:"중단", bot:"하단"};

  let lanes, player, stats, frontAction;

  // ===== 빌드 =====
  function buildLanes(){
    const host=$("lanes"); host.innerHTML="";
    lanes = LANE_DEFS.map(def=>{
      const el=document.createElement("div"); el.className="lane"; el.dataset.lane=def.id;
      el.innerHTML=
        '<div class="lane-head"><span class="lane-name">'+def.name+'<span class="sup">🛡 지원 중</span></span>'+
        '<span class="lane-state"></span></div>'+
        '<div class="stage">'+
          '<div class="allies"></div><div class="ally-line"></div>'+
          '<div class="battlefield"></div>'+
        '</div>'+
        '<div class="integrity"><i></i></div>'+
        '<div class="support-badge">🛡</div>';
      host.appendChild(el);
      const alliesBox=el.querySelector(".allies");
      def.allies.forEach(c=>{ const u=document.createElement("div"); u.className="u ally"; u.style.setProperty("--c","var("+c+")"); alliesBox.appendChild(u); });
      return {
        id:def.id, name:def.name, def, el,
        allyEls:[...alliesBox.children],
        field: el.querySelector(".battlefield"),
        integEl: el.querySelector(".integrity"),
        integFill: el.querySelector(".integrity i"),
        stateEl: el.querySelector(".lane-state"),
        supEl: el.querySelector(".lane-name .sup"),
        enemies:[], integrity:T.integrityMax, broken:false,
        threat:null, nextThreatAt:0, nextSpawnAt:0, nextAllyAtk:0,
      };
    });
    // 지원 표식은 .sup(헤더)로, support-badge(우측)도 함께 — 헤더 sup은 .here일때만 보이게 처리
    lanes.forEach(l=>{ l.supEl.style.display="none"; });
  }
  const laneById=id=>lanes.find(l=>l.id===id);

  // ===== 배경 오토배틀 시뮬 =====
  function spawnEnemy(l, big){
    if(l.enemies.length>=7) return;
    const e=document.createElement("div"); e.className="foe"+(big?" big":"");
    e.style.setProperty("--c","var("+l.def.foe+")");
    const x = 96 + Math.random()*4;          // 우측 끝(%)
    e.style.right = (100-x)+"%";
    e.style.top = (28+Math.random()*44)+"%";
    l.field.appendChild(e);
    l.enemies.push({ el:e, x, big:!!big, hp: big?3:1 });
  }
  function allyShot(l){
    const sh=document.createElement("div"); sh.className="shot";
    sh.style.right="80%"; sh.style.top=(35+Math.random()*30)+"%";
    l.field.appendChild(sh);
    sh.animate([{right:"80%",opacity:1},{right:"6%",opacity:.7}], {duration:Math.max(120,260), easing:"linear"});
    setTimeout(()=>{ if(sh.parentNode) sh.parentNode.removeChild(sh); }, 270);
    // 가장 앞선(작은 x) 적 처치
    if(l.enemies.length){
      let idx=0; for(let i=1;i<l.enemies.length;i++) if(l.enemies[i].x<l.enemies[idx].x) idx=i;
      const tgt=l.enemies[idx]; tgt.hp--;
      if(tgt.hp<=0){ killEnemy(l, idx); }
    }
  }
  function killEnemy(l, idx){
    const e=l.enemies[idx]; if(!e) return;
    e.el.classList.add("dying");
    const el=e.el; setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 160);
    l.enemies.splice(idx,1);
  }
  function pushEnemiesBack(l, amt){
    l.enemies.forEach(e=>{ e.x=clamp(e.x+amt, 12, 100); e.el.style.right=(100-e.x)+"%"; });
  }

  function simLane(l, now, dt){
    const supported = player.supporting===l.id;
    // 적 스폰
    if(now>=l.nextSpawnAt){ spawnEnemy(l, Math.random()<0.18); l.nextSpawnAt = now + (900+Math.random()*700); }
    // 아군 사격(지원 중이면 더 자주)
    if(now>=l.nextAllyAtk){
      const a=l.allyEls[(Math.random()*l.allyEls.length)|0]; if(a){ a.classList.remove("atk"); void a.offsetWidth; a.classList.add("atk"); }
      allyShot(l);
      l.nextAllyAtk = now + (supported ? (480+Math.random()*260) : (820+Math.random()*420));
    }
    // 적 전진 + 라인 누수
    const speed = (supported?0.55:0.95) * (dt/16);
    for(let i=l.enemies.length-1;i>=0;i--){
      const e=l.enemies[i]; e.x -= speed;
      if(e.x<=18){ // 아군 라인 도달 → 소멸 + 누수 피해
        killEnemy(l, i);
        damageLane(l, e.big?2.0:1.0, false);
      } else { e.el.style.right=(100-e.x)+"%"; }
    }
    // 상시 미세 누수 + 자연 회복
    const leak = (supported?T.leakSupported:T.leakOpen) * (dt/1000);
    l.integrity = clamp(l.integrity - leak, 0, T.integrityMax);
    if(l.broken){ l.integrity = clamp(l.integrity + T.regen*(dt/1000)*2.2, 0, T.integrityMax); if(l.integrity>34) l.broken=false; }
  }

  function damageLane(l, amt, big){
    l.integrity = clamp(l.integrity - amt, 0, T.integrityMax);
    if(l.integrity<=0){ l.broken=true; }
  }
  function healLane(l, amt){ l.integrity = clamp(l.integrity + amt, 0, T.integrityMax); if(l.integrity>34) l.broken=false; }

  // ===== 위협 스케줄 =====
  function activeThreatCount(){ return lanes.filter(l=>l.threat).length; }
  function pickPattern(id){ const p=LANE_POOL[id]||PATTERN_KEYS; return p[(Math.random()*p.length)|0]; }

  function maybeScheduleThreat(now){
    if(frontAction) return;                       // 전면 액션 중엔 새 예고 보류
    if(activeThreatCount()>=T.maxConcurrent) return;
    const cands=lanes.filter(l=>!l.threat && now>=l.nextThreatAt);
    if(!cands.length) return;
    const l=cands[(Math.random()*cands.length)|0];
    const key=pickPattern(l.id);
    const warnLead = (key==="heavy"?3400:2700)*T.teleScale;   // 예고→자동피해 리드(관찰+선택 시간)
    l.threat={ key, fireAt: now+warnLead, fired:false };
    l.el.classList.add("warning");
    l.stateEl.textContent="⚠ 돌파 공격";
    l.stateEl.classList.add("warn");
    l.nextThreatAt = now + T.threatGap*(0.8+Math.random()*0.5);
  }

  function resolveThreatFire(l, now){
    if(!l.threat || l.threat.fired || now<l.threat.fireAt) return;
    l.threat.fired=true;
    const key=l.threat.key;
    l.el.classList.remove("warning"); l.stateEl.textContent=""; l.stateEl.classList.remove("warn");
    autoFail(l, key);   // 아무도 막으러 오지 않음 → 전선이 뚫림(자동 진입 없음)
    l.threat=null;
  }

  function autoFail(l, key){
    const P=PATTERNS[key];
    damageLane(l, P.dmg, true);
    stats.hit++;
    laneFx(l, false);
    showLaneToast(l, false);
    updateLaneVisual(l);
  }

  // ===== 전면 방패 액션 =====
  function enterFront(l, key){
    const P=PATTERNS[key];
    const now=gameNow();
    frontAction={ laneId:l.id, key, dmg:P.dmg, hits:P.notes(now, T.teleScale), startAt:now, settled:false };
    $("faLane").textContent=l.name;
    $("faPat").textContent=P.name;
    $("lanes").classList.add("dimmed");
    const host=$("faIncoming"); host.innerHTML="";
    const fa=$("front"); fa.classList.add("on");
    $("faShield").classList.remove("guard","perfect","broken");
    { const hi=$("faHeroImg"); if(hi) hi.src=HERO_SPRITES.hero_guard; }
    // 수렴 공격 링 DOM (바깥에서 접점으로 조여듦)
    frontAction.hits.forEach(h=>{
      const n=document.createElement("div"); n.className="incoming";
      const col = key==="heavy"?"var(--danger)":(key==="triple"?"#ff9a6a":"#ffcf7a");
      n.style.borderColor=col; n.style.boxShadow="0 0 18px "+col+", inset 0 0 12px "+col+"55";
      n.style.width="40px"; n.style.height="40px"; n.style.opacity="0";
      host.appendChild(n); h.el=n;
    });
  }

  function exitFront(){
    const fa=$("front"); fa.classList.remove("on");
    $("lanes").classList.remove("dimmed");
    $("faIncoming").innerHTML="";
    frontAction=null;
  }

  function tapGuard(){
    if(!frontAction || frontAction.settled) return;
    const h=frontAction.hits.find(x=>!x.resolved);
    if(!h){ return; }
    const now=gameNow();
    const ae=Math.abs(now-h.impact);
    if(ae>T.guard){ shieldReact("early"); return; }   // 너무 이른 헛탭 → 소비 안 함
    const j=judge(ae);
    resolveNote(h, j);
  }

  function resolveNote(h, j){
    h.resolved=true; h.judgment=j;
    stats[j]=(stats[j]||0)+1;
    if(h.el){ h.el.style.opacity="0"; h.el.style.transform="translate(-50%,-50%) scale(.4)"; }
    showJudge(j);
    shieldReact(j);
    settleFrontIfDone();
  }

  function settleFrontIfDone(){
    if(!frontAction || frontAction.settled) return;
    if(!frontAction.hits.every(h=>h.resolved)) return;
    frontAction.settled=true;
    const l=laneById(frontAction.laneId);
    const per = frontAction.dmg;                 // 노트당 피해(미방어 시)
    let dmg=0, perfectAll=true;
    frontAction.hits.forEach(h=>{
      if(h.judgment==="PERFECT"||h.judgment==="PARRY"){ /* 완전 방어 */ }
      else if(h.judgment==="GUARD"){ dmg+=per*0.5; perfectAll=false; }
      else { dmg+=per; perfectAll=false; }       // MISS
    });
    const success = dmg < per*0.5 + 0.001;        // 거의 다 막음
    if(dmg>0) damageLane(l, dmg, false);
    if(perfectAll){ healLane(l, 14); pushEnemiesBack(l, 16); }
    else if(success){ healLane(l, 6); pushEnemiesBack(l, 8); }
    if(success || perfectAll){ stats.saved++; laneFx(l, true); showLaneToast(l, true); }
    else { stats.hit++; laneFx(l, false); showLaneToast(l, false); }
    updateLaneVisual(l);
    frontAction.exitAt = gameNow()+360;     // 시계 기반 지연(일시정지 안전)
  }

  // ===== 피드백 =====
  function showJudge(j){
    const el=$("faJudge");
    const txt = j==="PERFECT"?"PERFECT!":j==="PARRY"?"PARRY!":j==="GUARD"?"GUARD":"놓침!";
    el.textContent=txt;
    el.style.color = j==="PERFECT"?"var(--perfect)":j==="PARRY"?"var(--parry)":j==="GUARD"?"var(--guard)":"var(--miss)";
    el.style.opacity="0";
    el.animate([{opacity:0,transform:"translateY(8px) scale(.8)"},{opacity:1,transform:"translateY(0) scale(1.05)"},{opacity:0,transform:"translateY(-6px) scale(1)"}],
      {duration:Math.max(200,560), easing:"ease-out"});
  }
  let heroPoseTimer=0;
  function setHeroPose(p){ const img=$("faHeroImg"); if(img && HERO_SPRITES[p]) img.src=HERO_SPRITES[p]; }
  function shieldReact(kind){
    const s=$("faShield"); s.classList.remove("guard","perfect","broken"); void s.offsetWidth;
    if(kind==="PERFECT"){ s.classList.add("perfect"); setHeroPose("hero_perfect"); }
    else if(kind==="PARRY"){ s.classList.add("guard"); setHeroPose("hero_parry"); }
    else if(kind==="GUARD"){ s.classList.add("guard"); setHeroPose("hero_guard"); }
    else if(kind==="MISS"){ s.classList.add("broken"); setHeroPose("hero_idle"); }    // 피격 전용 포즈는 다음 추출
    else if(kind==="early"){ return; }
    clearTimeout(heroPoseTimer);
    heroPoseTimer=setTimeout(()=>setHeroPose("hero_guard"), 600);   // 대기 포즈 복귀(시각용)
  }
  function laneFx(l, ok){
    l.el.classList.remove("saved-flash","hit-flash"); void l.el.offsetWidth;
    l.el.classList.add(ok?"saved-flash":"hit-flash");
  }
  function showLaneToast(l, ok){
    l.stateEl.classList.remove("warn");
    l.stateEl.style.color = ok ? "var(--good)" : "var(--danger)";
    l.stateEl.textContent = ok ? (SHORT[l.id]+" 보호!") : (SHORT[l.id]+" 피해!");
    setTimeout(()=>{ if(l.stateEl){ l.stateEl.textContent=""; l.stateEl.style.color=""; } }, 1100);
  }

  // ===== 전선 시각 갱신 =====
  function updateLaneVisual(l){
    const pct=l.integrity/T.integrityMax*100;
    l.integFill.style.width=pct+"%";
    l.integEl.classList.toggle("low", pct<=55 && pct>28);
    l.integEl.classList.toggle("crit", pct<=28);
    l.el.classList.toggle("broken", l.broken);
  }

  // ===== 지원 전선 =====
  function setSupport(id){
    player.supporting=id;
    lanes.forEach(l=>{ const on=l.id===id; l.el.classList.toggle("here", on); l.supEl.style.display=on?"inline":"none"; });
    $("supName").textContent=SHORT[id];
  }
  // 전선 탭 = 플레이어의 선택. 위험(위협)이 있으면 그 전선으로 막으러 진입.
  function selectLane(l){
    if(paused || frontAction) return;
    if(l.threat && !l.threat.fired){
      const key=l.threat.key;
      l.threat=null;
      l.el.classList.remove("warning"); l.stateEl.textContent=""; l.stateEl.classList.remove("warn");
      setSupport(l.id);
      enterFront(l, key);            // 내가 고른 결과로 전면 액션 진입
    } else {
      setSupport(l.id);              // 평온한 전선 → 지원 표시(관찰/대기)
    }
  }
  function supportLane(id){ const l=laneById(id); if(l) selectLane(l); }

  // ===== 렌더 루프 =====
  let lastT=0;
  function render(){
    if(paused){ requestAnimationFrame(render); return; }    // 일시정지 동결
    const now=gameNow();
    let dt = lastT? (now-lastT):16; if(dt>60) dt=60; lastT=now;

    // 배경 시뮬
    lanes.forEach(l=>{ simLane(l, now, dt); updateLaneVisual(l); });
    // 위협 예고/발동
    maybeScheduleThreat(now);
    lanes.forEach(l=>resolveThreatFire(l, now));

    // 전면 액션: 중앙 접점 수렴 + 자동 MISS
    if(frontAction && !frontAction.settled){
      const TARGET_D=80;
      frontAction.hits.forEach(h=>{
        if(!h.el) return;
        if(h.resolved){ return; }
        if(now<h.spawnAt){ h.el.style.opacity="0"; return; }
        const span=Math.max(1, h.impact-h.spawnAt);
        const prog=clamp((now-h.spawnAt)/span, 0, 1.3);
        const startD=h.big?360:264;                       // 바깥 큰 링 → 접점 크기로 수축
        const d=lerp(startD, TARGET_D, Math.min(prog,1));
        h.el.style.width=d+"px"; h.el.style.height=d+"px";
        h.el.style.opacity=clamp(0.12+prog*1.0,0,1).toFixed(3);
        if(now>h.impact+T.guard){ resolveNote(h, "MISS"); }
      });
      settleFrontIfDone();
    }
    if(frontAction && frontAction.settled && gameNow()>=frontAction.exitAt){ exitFront(); }

    // 생존시간
    stats.surv=(now-stats.survStart)/1000;
    $("survT").textContent=stats.surv.toFixed(1);
    $("cP").textContent=stats.PERFECT||0; $("cPa").textContent=stats.PARRY||0;
    $("cG").textContent=stats.GUARD||0;  $("cM").textContent=stats.MISS||0;

    requestAnimationFrame(render);
  }

  // ===== 입력 =====
  function bindInput(){
    // 배경 전선 탭 = 지원
    lanes.forEach(l=>{
      l.el.addEventListener("pointerdown", e=>{
        e.preventDefault(); if(paused || frontAction) return;
        selectLane(l); hideHint();
      }, {passive:false});
    });
    // 전면 레이어 탭 = 방어
    $("front").addEventListener("pointerdown", e=>{
      e.preventDefault(); if(paused) return; tapGuard();
    }, {passive:false});
  }
  let hintHidden=false;
  function hideHint(){ if(hintHidden) return; hintHidden=true; const h=$("hint"); if(h) h.style.opacity="0"; }

  // ===== Lab =====
  const panel=$("panel"), scrim=$("scrim");
  function openPanel(){ if(paused) return; paused=true; pauseStart=perf(); panel.classList.add("open"); scrim.classList.add("open"); }
  function closePanel(){ if(!paused) return; pausedAccum+=perf()-pauseStart; paused=false; lastT=0; panel.classList.remove("open"); scrim.classList.remove("open"); }
  $("labBtn").onclick=openPanel; $("closeBtn").onclick=closePanel; $("closeX").onclick=closePanel; scrim.onclick=closePanel;
  $("resetBtn").onclick=()=>fullReset();

  function pushSliders(){
    $("sTele").value=T.teleScale; $("vTele").textContent=T.teleScale.toFixed(2)+"×";
    $("sGap").value=T.threatGap;  $("vGap").textContent=(T.threatGap/1000).toFixed(1)+"s";
    $("sMax").value=T.maxConcurrent; $("vMax").textContent=T.maxConcurrent+"개";
    $("sPf").value=T.perfect; $("vPf").textContent="±"+T.perfect;
  }
  $("sTele").oninput=e=>{ T.teleScale=parseFloat(e.target.value); $("vTele").textContent=T.teleScale.toFixed(2)+"×"; };
  $("sGap").oninput =e=>{ T.threatGap=parseInt(e.target.value); $("vGap").textContent=(T.threatGap/1000).toFixed(1)+"s"; };
  $("sMax").oninput =e=>{ T.maxConcurrent=parseInt(e.target.value); $("vMax").textContent=T.maxConcurrent+"개"; };
  $("sPf").oninput  =e=>{ T.perfect=parseInt(e.target.value); $("vPf").textContent="±"+T.perfect; };
  $("defBtn").onclick=()=>{ Object.assign(T,DEFAULTS); pushSliders(); };

  // ===== 리셋 / 부트 =====
  function fullReset(){
    closePanel();
    if(frontAction) exitFront();
    document.querySelectorAll(".foe,.shot,.note").forEach(n=>n.remove());
    const now=gameNow();
    lanes.forEach((l,i)=>{
      l.enemies.length=0; l.field.innerHTML="";
      l.integrity=T.integrityMax; l.broken=false; l.threat=null;
      l.el.classList.remove("warning","broken","saved-flash","hit-flash");
      l.stateEl.textContent=""; l.stateEl.classList.remove("warn"); l.stateEl.style.color="";
      l.nextThreatAt = now + 1600 + i*900;      // 시작 직후 잠깐 여유
      l.nextSpawnAt = now + i*200; l.nextAllyAtk = now + 300 + i*150;
      updateLaneVisual(l);
    });
    player={ supporting:"mid" };
    lanes.forEach(l=>{ const on=l.id==="mid"; l.el.classList.toggle("here", on); l.supEl.style.display=on?"inline":"none"; });
    $("supName").textContent="중단";
    stats={ PERFECT:0, PARRY:0, GUARD:0, MISS:0, saved:0, hit:0, survStart:now, surv:0 };
    lastT=0; hintHidden=false; const h=$("hint"); if(h) h.style.opacity="1";
  }

  function boot(){
    buildLanes(); bindInput(); pushSliders(); fullReset();
    requestAnimationFrame(render);
    window.addEventListener("resize", ()=>{});
  }
  boot();

  // ===== 디버그 핸들 (검증 진입점) =====
  window.__seed02c={
    T, gameNow, judge,
    getPlayer:()=>({supporting:player.supporting}),
    getLanes:()=>lanes.map(l=>({id:l.id, integrity:Math.round(l.integrity*100)/100, enemies:l.enemies.length,
      broken:l.broken, threat: l.threat?{key:l.threat.key, fireAt:l.threat.fireAt, fired:l.threat.fired}:null})),
    getStats:()=>stats,
    getFrontAction:()=> frontAction?{laneId:frontAction.laneId, key:frontAction.key, settled:frontAction.settled,
      hits:frontAction.hits.map(h=>({impact:h.impact, resolved:h.resolved, judgment:h.judgment}))}:null,
    isDimmed:()=>$("lanes").classList.contains("dimmed"),
    supportLane,
    selectLane:(id)=>{ const l=laneById(id); if(l) selectLane(l); },
    tapGuard,
    // 즉시 예고(원하는 lane/패턴, 짧은 리드)
    triggerThreat:(id,key,leadMs)=>{ const l=laneById(id); if(!l) return; l.threat={key:PATTERNS[key]?key:"single", fireAt:gameNow()+(leadMs==null?1600:leadMs), fired:false}; l.el.classList.add("warning"); l.stateEl.textContent="⚠ 돌파 공격"; l.stateEl.classList.add("warn"); },
    // 전면 액션 강제 진입(지원 여부 무시)
    forceFront:(id,key)=>{ const l=laneById(id); if(l && !frontAction) enterFront(l, PATTERNS[key]?key:"single"); },
    getIntegrity:(id)=>{ const l=laneById(id); return l?l.integrity:null; },
    reset:fullReset,
    setPaused:(v)=>{ v?openPanel():closePanel(); },
  };
})();
</script>
</body>
</html>
